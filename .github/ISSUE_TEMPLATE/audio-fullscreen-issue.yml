name: Audio / Fullscreen Issue
about: Report audio-control or fullscreen interaction problems
title: "[Audio/Fullscreen]: "
labels: ["audio", "fullscreen", "triage"]
body:
  - type: input
    id: browser_version
    attributes:
      label: Browser Version
      placeholder: e.g. Chrome 126.0.x
    validations:
      required: true
  - type: input
    id: extension_version
    attributes:
      label: Extension Version
      placeholder: e.g. 1.0.0
    validations:
      required: true
  - type: input
    id: site
    attributes:
      label: Site/App URL or Hostname
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Include when fullscreen is entered/exited and what control was changed.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Screenshots/Logs
      description: Include runtime diagnostics screenshot if available.
  - type: markdown
    attributes:
      value: |
        Privacy note: redact account names, media titles, or personal identifiers if needed.
