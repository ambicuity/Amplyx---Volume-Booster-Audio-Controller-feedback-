name: Compatibility / Site Issue
about: Report site-specific compatibility behavior
title: "[Compatibility]: "
labels: ["compatibility", "triage"]
body:
  - type: input
    id: browser_version
    attributes:
      label: Browser Version
    validations:
      required: true
  - type: input
    id: extension_version
    attributes:
      label: Extension Version
    validations:
      required: true
  - type: input
    id: site
    attributes:
      label: Site/App URL or Hostname
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility Symptoms
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
    validations:
      required: true
  - type: textarea
    id: expected_actual
    attributes:
      label: Expected vs Actual
    validations:
      required: true
  - type: textarea
    id: media
    attributes:
      label: Screenshots/Logs
