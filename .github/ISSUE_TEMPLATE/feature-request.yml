name: Feature Request
about: Suggest a product improvement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: input
    id: browser_version
    attributes:
      label: Browser Version
      placeholder: e.g. Chrome 126.0.x
    validations:
      required: true
  - type: input
    id: extension_version
    attributes:
      label: Extension Version
      placeholder: e.g. 1.0.0
    validations:
      required: true
  - type: input
    id: site
    attributes:
      label: Site/App URL or Hostname (if relevant)
  - type: textarea
    id: problem
    attributes:
      label: Problem to Solve
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
  - type: markdown
    attributes:
      value: |
        Privacy note: avoid posting personal data or credentials.
