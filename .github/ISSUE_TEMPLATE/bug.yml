name: "🐛 Bug Report"
description: Report a bug in Amplyx behavior on a site or app
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        Please share enough detail for us to reproduce the issue quickly.
  - type: input
    id: browser_version
    attributes:
      label: Browser version
      description: Your browser and version
      placeholder: Chrome 126.0.x
    validations:
      required: true
  - type: input
    id: extension_version
    attributes:
      label: Amplyx extension version
      description: Version shown in the extension details page
      placeholder: 1.0.0
    validations:
      required: true
  - type: input
    id: site_url
    attributes:
      label: Site or app URL
      description: The page where the issue happens
      placeholder: https://example.com
    validations:
      required: true
  - type: textarea
    id: repro_steps
    attributes:
      label: Reproduction steps
      description: Step-by-step instructions
      placeholder: |
        1. Open ...
        2. Click ...
        3. Change volume ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: screenshots_logs
    attributes:
      label: Screenshots or logs (optional)
      description: Add screenshots, screen recordings, or console/runtime logs if available
  - type: markdown
    attributes:
      value: |
        Privacy note: this is a public repository. Please do not include passwords, tokens, or personal data.
